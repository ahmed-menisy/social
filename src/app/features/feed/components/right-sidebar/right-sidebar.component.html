<button
  type="button"
  (click)="showSuggested()"
  class="inline-flex xl:hidden mb-4 w-full items-center justify-between rounded-2xl border border-slate-200 bg-white px-4 py-3 text-left shadow-sm"
>
  <span class="inline-flex items-center gap-2 text-sm font-extrabold text-slate-900"
    >
    <i class="fa-solid fa-user-group text-blue-600 text-[1.1rem]"></i>
    Suggested Friends</span
  ><span class="inline-flex items-center gap-2"
    ><span class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-600">{{SuggestionList.length}}</span
    ><span class="text-xs font-bold text-[#1877f2]">{{isHidden? 'show':'hide'}}</span></span
  >
</button>
<aside [class.hidden]="isHidden" class="bg-white sticky xl:block top-21 rounded-3xl shadow-sm  border border-slate-100 p-4 font-sans">
    
  <div class="flex items-center justify-between mb-4 px-1">
    <div class="flex items-center gap-2">
      <i class="fa-solid fa-user-group text-blue-600 text-[1.1rem]"></i>
      <h2 class="font-bold text-slate-900 text-[17px]">Suggested Friends</h2>
    </div>
    <span class="bg-slate-100 text-slate-600 text-xs font-bold px-2.5 py-1 rounded-full">{{SuggestionList.length}}</span>
  </div>


  <app-search-friends-input (suggestedList)="getSearchSuggestionsData($event)"></app-search-friends-input>
  <div class="grid gap-3 grid-cols-1 pb-1">
  @if (loading) {
     @for (item of [1,2,3,4]; track $index) {
    <app-loading [loadingType]="'suggested user'"></app-loading>
  } 
  }
  @else {
    @for (user  of SuggestionList; track user._id) {
    <app-sugested-user (functionCall)="getSearchSuggestionsData(inputValue)" [user]="user"></app-sugested-user>
  }
  @empty {
    <p class="text-sm text-slate-500">No users matched your search.</p>
    
  }
  }
  </div>


  <button routerLink="/suggestions"
    class="w-full cursor-pointer mt-3 py-2.5 bg-white border border-slate-200 rounded-xl text-[14px] font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-all outline-none focus:ring-4 focus:ring-slate-100"
  >
    View more
  </button>
</aside>
