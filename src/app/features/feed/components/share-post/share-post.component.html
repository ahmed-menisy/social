@if (cancelFlag===false) {
    <div class="fixed inset-0 z-70 flex items-center justify-center bg-slate-900/65 p-4">
  <div class="w-full max-w-140 rounded-2xl border border-slate-200 bg-white shadow-2xl">
    <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3">
      <h4 class="text-base font-extrabold text-slate-900">Share post</h4>
      <button (click)="cnacelFn()"
        type="button"
        class="inline-flex cursor-pointer h-8 w-8 items-center justify-center rounded-full text-slate-500 transition hover:bg-slate-100 hover:text-slate-700 disabled:opacity-60"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-x"
          aria-hidden="true"
        >
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    </div>
    <div class="space-y-3 p-4">
      <textarea [formControl]="content"
        placeholder="Say something about this..."
        rows="3"
        maxlength="500"
        class="w-full resize-none rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-800 outline-none transition focus:border-[#1877f2] focus:ring-2 focus:ring-[#1877f2]/20"
      ></textarea>
      <div class="rounded-xl border border-slate-200 bg-slate-50 p-3">
        <div class="flex items-center gap-2">
          <img [routerLink]="['/profile',post.user._id]"
            [alt]="post.user.name"
            class="h-8 w-8 cursor-pointer rounded-full object-cover"
            [src]="post.user.photo"
          />
          <div class="min-w-0">
            <a [routerLink]="['/profile',post.user._id]" class="truncate cursor-pointer text-sm font-bold text-slate-900">{{post.user.name}}</a>
            <p class="truncate text-xs font-semibold text-slate-500">@{{post.user.username}}</p>
          </div>
        </div>
        <p class="mt-2 whitespace-pre-wrap text-sm text-slate-800">{{post.body}}</p>
        @if (post.image) {
            <img
          alt="post preview"
          class="mt-2 max-h-55 w-full rounded-lg object-cover"
          [src]="post.image"
        />
        }
      </div>
    </div>
    <div class="flex items-center justify-end gap-2 border-t border-slate-200 px-4 py-3">
      <button (click)="cnacelFn()"
        type="button"
        class="rounded-lg border cursor-pointer border-slate-300 px-4 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-100 disabled:opacity-60"
      >
        Cancel</button
      ><button (click)="submit(post._id)"
        type="button"
        class="inline-flex cursor-pointer items-center rounded-lg bg-[#1877f2] px-4 py-2 text-sm font-bold text-white transition hover:bg-[#166fe5] disabled:cursor-not-allowed disabled:opacity-60"
      >
        Share now
      </button>
    </div>
  </div>
</div>
}
