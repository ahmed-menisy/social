<div class="mx-auto max-w-3xl py-3.5 space-y-4">
    <button (click)="navService.goBack()" class="inline-flex cursor-pointer items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left" aria-hidden="true"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>Back</button>
@if (post) {
    <app-single-post (callParentFunction)="returnToFeed()" [post]="post" ></app-single-post>

}
@else {
    <app-loading [loadingType]="'single post'"></app-loading>
}
</div>
