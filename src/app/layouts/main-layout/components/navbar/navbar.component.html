@if (true) {
  <nav class="sticky top-0 z-40 border-b border-slate-200/90 bg-white/95 backdrop-blur">
    <div
      class="mx-auto flex max-w-7xl items-center justify-between gap-2 px-2 py-1.5 sm:gap-3 sm:px-3"
    >
      <!-- Logo -->
      <a class="flex items-center gap-2">
        <img
          src="./assets/images/hive-brands-solid.png"
          class="h-9 w-9 rounded-xl object-cover"
          alt="Vexa Logo"
        />
        <span class="hidden text-xl font-extrabold text-slate-900 sm:block">Vexa</span>
      </a>

      <!-- Right side: user menu + mobile hamburger -->
      <div class="flex items-center order-2 gap-2">
        <!-- User Menu Button (Flowbite dropdown trigger preserved) -->
        <div class="relative">
          <button
            type="button"
            id="user-menu-button"
            aria-expanded="false"
            data-dropdown-toggle="user-dropdown"
            data-dropdown-placement="bottom"
            class="flex items-center gap-2 rounded-full border border-slate-200 bg-slate-50 px-2 py-1.5 transition hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-slate-300"
          >
            @if (profileData) {
              <span class="sr-only">Open user menu</span>
              <img
                class="h-8 w-8 rounded-full object-cover"
                [src]="userDataService.profilePhotoUrl"
                alt="user photo"
              />
              <span
                class="hidden max-w-35 truncate text-sm font-semibold text-slate-800 md:block"
                >{{ profileData.name }}</span
              >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="text-slate-500 hidden md:block"
                aria-hidden="true"
              >
                <path d="M4 5h16" />
                <path d="M4 12h16" />
                <path d="M4 19h16" />
              </svg>
            }
          </button>

          <!-- Flowbite Dropdown: id="user-dropdown" and data-dropdown-toggle on button above are what Flowbite's JS hooks into -->
          <div
            id="user-dropdown"
            class="z-50 hidden absolute right-0 mt-2 w-52 rounded-xl border border-slate-200 bg-white p-2 shadow-lg"
          >
            <ul class="text-sm" aria-labelledby="user-menu-button">
              <li>
                <a
                  (click)="closeDropdown()"
                  routerLink="/changePassword"
                  routerLinkActive="bg-slate-100"
                  class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-100"
                >
                  <i class="fa-solid fa-gear" aria-hidden="true"></i> Settings
                </a>
              </li>
              <li>
                <div class="my-1 border-t border-slate-200"></div>
              </li>
              <li>
                <a
                  (click)="logOut()"
                  class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-sm font-semibold text-rose-600 hover:bg-rose-50 cursor-pointer"
                >
                  Logout
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <!-- Nav Links: id="navbar-user" is the Flowbite collapse target, md:order-1 keeps layout correct -->
      <div id="navbar-user" class="items-center justify-between flex w-auto order-1">
        <ul
          class="flex flex-row gap-1 w-auto mt-0 rounded-2xl border border-slate-200 bg-slate-50/90 px-1 py-1 sm:px-1.5"
        >
          <li>
            <a
              routerLink="/feed"
              routerLinkActive="!text-mainColor bg-white"
              class="relative flex items-center gap-2 rounded-xl px-3.5 md:py-2 py-3 text-sm font-extrabold text-slate-600 transition hover:bg-white/90 hover:text-slate-900 w-full"
              aria-current="page"
            >
              <i class="fa-solid fa-house" aria-hidden="true"></i>
              <span class="hidden md:inline">Feed</span>
            </a>
          </li>
          <li>
            <a
              [routerLink]="['/friends', userId]"
              routerLinkActive="!text-mainColor bg-white"
              class="relative flex items-center gap-2 rounded-xl px-3.5 md:py-2 py-3 text-sm font-extrabold text-slate-600 transition hover:bg-white/90 hover:text-slate-900 w-full"
              aria-current="page"
            >
              <i class="fa-solid fa-user-group" aria-hidden="true"></i>
              <span class="hidden md:inline">Friends</span>
            </a>
          </li>
          <li>
            <a
              [routerLink]="['/profile', profileData ? profileData._id : '']"
              routerLinkActive="bg-white !text-mainColor"
              class="relative flex items-center gap-2 rounded-xl px-3.5 md:py-2 py-3 text-sm font-extrabold text-slate-600 transition hover:bg-white/90 hover:text-slate-900 w-full"
              aria-current="page"
            >
              <i class="fa-solid fa-circle-user" aria-hidden="true"></i>

              <span class="hidden md:inline">Profile</span>
            </a>
          </li>

          <li>
            <a
              routerLink="/notification"
              routerLinkActive="bg-white !text-mainColor"
              class="relative flex items-center gap-2 rounded-xl px-3.5 py-2 text-sm font-extrabold text-slate-600 transition hover:bg-white/90 hover:text-slate-900 w-full"
              aria-current="page"
            >
              <span class="relative">
                <i class="fa-solid fa-bell" aria-hidden="true"></i>
                @if (UnreadCountService && UnreadCountService.updatedUnreadCount > 0) {
                  <span
                    class="absolute -right-2.5 -top-2 inline-flex min-w-4 items-center justify-center rounded-full bg-red-500 px-1 text-2xs font-black leading-4 text-white"
                  >
                    {{ UnreadCountService.updatedUnreadCount }}
                  </span>
                }
              </span>

              <!-- Notification badge -->
              <span class="hidden md:inline"> Notifications </span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
}
