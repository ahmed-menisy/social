   @if (openImageFullScreenService.imageUrl) {
        <div class="fixed inset-0 z-80 flex items-center justify-center bg-black/90 p-4 sm:p-8">
          <button
            (click)="openImageFullScreenService.closeImage()"
            type="button"
            class="absolute cursor-pointer right-4 top-4 inline-flex h-10 w-10 items-center justify-center rounded-full bg-white/10 text-white transition hover:bg-white/20"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-x"
              aria-hidden="true"
            >
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg></button
          ><img
            alt="cover photo"
            class="max-h-full max-w-full object-contain"
            [src]="openImageFullScreenService.imageUrl"
          />
        </div>
      }
