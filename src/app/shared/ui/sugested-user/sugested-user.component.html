 <div [routerLink]="['/profile',user._id]"
      class="p-3 border cursor-pointer border-slate-200 rounded-2xl bg-white hover:border-slate-300 transition-colors"
    >
      <div class="flex items-start gap-3">
        <img
          [src]="user.photo"
          [alt]="user.name"
          class="w-11 h-11 rounded-full object-cover shrink-0 bg-slate-100 border border-slate-50"
        />

        <div class="flex-1 min-w-0 flex flex-col gap-2">
          <div class="flex items-center justify-between gap-2 mt-0.5">
            <div class="flex truncate flex-col ">
              <span class="text-[14px] font-bold text-slate-900 truncate leading-tight"
                >{{user.name}}</span
              >
              <span class="text-[13px] text-slate-500 truncate leading-tight mt-0.5"
                >{{user.username? `@${user.username}`:''}}</span
              >
            </div>
           @if (!friend) {
             <button (click)="followUnfollowUserItem(user._id);$event.stopPropagation()"
              class="shrink-0 flex cursor-pointer items-center gap-1.5 px-3.5 py-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 text-[13px] font-bold rounded-xl transition-colors"
            >
             @if (followLoading) {
                    <i class="fa-solid fa-user"></i>
                    updating...
                  }@else {
                   @if (isFollowing) {<i class="fa-solid fa-user-check text-[11px]"></i> Following}
                   @else {<i class="fa-solid fa-user-plus text-[11px]"></i> Follow}
                  }
              
            </button>
           }
          </div>
         @if (!friend) {
           <div class="flex items-center gap-2">
            <span
              class="text-[11px] font-semibold text-slate-500 bg-slate-100/80 px-2 py-1 rounded-lg"
              >{{user.followersCount}} followers</span
            >
            @if ('mutualFollowersCount' in user && user.mutualFollowersCount) {
              <span class="text-[11px] font-semibold text-blue-500 bg-blue-50 px-2 py-1 rounded-lg"
              >{{user.mutualFollowersCount}} mutual</span
            >
            }
          </div>
         }
        </div>
      </div>
    </div>
