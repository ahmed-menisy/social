<div class="fixed inset-0 z-90 flex items-center justify-center bg-slate-900/80 p-4">
  <div
    class="w-full max-w-130 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-2xl"
  >
    <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3">
      <h4 class="text-base font-extrabold text-slate-900">Confirm action</h4>
      <button (click)="close()"
        type="button"
        class="inline-flex cursor-pointer h-8 w-8 items-center justify-center rounded-full text-slate-500 transition hover:bg-slate-100 hover:text-slate-700"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-x"
          aria-hidden="true"
        >
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    </div>
    <div class="flex items-start gap-3 p-4">
      <div
        class="mt-0.5 inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-rose-100 text-rose-600"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-triangle-alert"
          aria-hidden="true"
        >
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"></path>
          <path d="M12 9v4"></path>
          <path d="M12 17h.01"></path>
        </svg>
      </div>
      <div>
        <h5 class="text-sm font-extrabold text-slate-900">{{data[0]}}</h5>
        <p class="mt-1 text-sm text-slate-600">
          {{data[1]}}
        </p>
      </div>
    </div>
    <div class="flex items-center justify-end gap-2 border-t border-slate-200 px-4 py-3">
      <button (click)="close()"
        type="button"
        [disabled]="loading"
        class="rounded-sm cursor-pointer border border-slate-300 px-4 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-60"
      >
        Cancel</button
      ><button (click)="callDelete()"
        type="button"
        [disabled]="loading"
        class="rounded-sm  cursor-pointer bg-rose-600 px-4 py-2 text-sm font-bold text-white transition hover:bg-rose-700 disabled:cursor-not-allowed disabled:opacity-70"
      >
       {{loading? `${data[2]}...`:data[2]}}
      </button>
    </div>
  </div>
</div>
